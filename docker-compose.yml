services:
  neo4j:
    image: neo4j:5.12
    container_name: kg-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  postgres:
    image: postgres:16
    container_name: kg-postgres
    environment:
      - POSTGRES_USER=knortex
      - POSTGRES_PASSWORD=knortex
      - POSTGRES_DB=knortex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
